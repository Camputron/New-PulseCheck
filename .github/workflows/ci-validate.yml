# Lints and builds the app + Cloud Functions.
name: CI / Validate
on:
  pull_request:
    branches:
      - main
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  validate:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack and Install Yarn v4
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      - name: Install App Dependencies
        run: yarn install

      - name: Lint App
        run: yarn lint

      - name: Build App
        run: yarn build

      - name: Install Functions Dependencies
        run: npm ci
        working-directory: firebase/functions

      - name: Lint Functions
        run: npm run lint
        working-directory: firebase/functions

      - name: Build Functions
        run: npm run build
        working-directory: firebase/functions
