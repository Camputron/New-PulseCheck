# Lints and builds the app + Cloud Functions, then spins up Firebase emulators
# and smoke-tests that all services (auth, firestore, hosting, storage, functions) are healthy.
name: CI / Validate
on:
  pull_request:
    branches:
      - main
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  validate:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java (required for Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Enable Corepack and Install Yarn v4
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install App Dependencies
        run: yarn install

      - name: Lint App
        run: yarn lint

      - name: Build App
        run: yarn build

      - name: Install Functions Dependencies
        run: npm ci
        working-directory: firebase/functions

      - name: Lint Functions
        run: npm run lint
        working-directory: firebase/functions

      - name: Build Functions
        run: npm run build
        working-directory: firebase/functions

      - name: Start Firebase Emulators
        run: firebase emulators:start --only auth,functions,firestore,hosting,storage --project new-pulsecheck &
        env:
          FIREBASE_EMULATORS_TIMEOUT: 120

      - name: Wait for Emulators to Start
        run: |
          echo "Waiting for emulator hub..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4400/emulators > /dev/null 2>&1; then
              echo "Hub is up, waiting for all services..."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Emulator hub failed to start after 60 seconds"
              exit 1
            fi
            sleep 1
          done
          # Give individual emulators time to initialize after hub is ready
          sleep 5

      - name: Verify All Emulators Are Running
        run: |
          echo "Checking emulators by port..."
          FAILED=false

          # auth:9099 functions:5001 firestore:8080 hosting:5050 storage:9199
          check_port() {
            local name=$1 port=$2
            if curl -sf -o /dev/null "http://localhost:${port}" 2>/dev/null || \
               curl -sf -o /dev/null "http://localhost:${port}/" 2>/dev/null || \
               nc -z localhost "$port" 2>/dev/null; then
              echo "✓ $name emulator is running (port $port)"
            else
              echo "✗ $name emulator is NOT running (port $port)"
              FAILED=true
            fi
          }

          check_port auth 9099
          check_port functions 5001
          check_port firestore 8080
          check_port hosting 5050
          check_port storage 9199

          # Also print hub response for debugging
          echo ""
          echo "Hub response:"
          curl -sf http://localhost:4400/emulators | python3 -m json.tool || true

          if [ "$FAILED" = true ]; then
            echo ""
            echo "Some emulators failed to start"
            exit 1
          fi

          echo ""
          echo "All Firebase emulators verified successfully"

      - name: Verify Hosting Emulator Serves App
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:5050)
          if [ "$STATUS" -eq 200 ]; then
            echo "✓ Hosting emulator serving app (HTTP $STATUS)"
          else
            echo "✗ Hosting emulator returned HTTP $STATUS"
            exit 1
          fi

      - name: Verify Functions Emulator Is Responsive
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:5001)
          if [ "$STATUS" -ne 000 ]; then
            echo "✓ Functions emulator is responsive (HTTP $STATUS)"
          else
            echo "✗ Functions emulator is not responding"
            exit 1
          fi

      - name: Shutdown Emulators
        if: always()
        run: |
          curl -sf -X PUT http://localhost:4400/shutdown > /dev/null 2>&1 || true
          echo "Emulators shut down"
